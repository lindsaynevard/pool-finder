name: Daily Schedule Scrape

on:
  schedule:
    - cron: '0 14 * * *'  # 6:00 AM Pacific every day
  workflow_dispatch:        # allows manual trigger from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the updated cache file
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install scraper dependencies
        run: npm install --ignore-scripts
        working-directory: scrapers

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('scrapers/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > scrapers/serviceAccount.json

      - name: Run scrapers
        run: npm run scrape
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}

      - name: Commit updated Albany schedule cache (if changed)
        run: |
          git config user.name "Pool Finder Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scrapers/.albany-schedule-cache.json
          git diff --staged --quiet || git commit -m "Auto-update Albany schedule [skip ci]"
          git push
