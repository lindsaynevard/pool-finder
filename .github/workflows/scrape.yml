name: Daily Schedule Scrape

on:
  schedule:
    - cron: '0 14 * * *'  # 6:00 AM Pacific every day
  workflow_dispatch:        # allows manual trigger from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > scrapers/serviceAccount.json

      - name: Run scrapers
        run: npm run scrape
